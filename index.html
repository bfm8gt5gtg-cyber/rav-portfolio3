<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAV | Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0b0b0f;
      color: #fff;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 6px;
      margin-top: 20px;
    }

    p {
      color: #aaa;
      margin-top: 10px;
    }

    .profile {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #222;
      box-shadow: 0 0 25px rgba(255,255,255,0.05);
    }

    nav {
      position: absolute;
      top: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #fff;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#">Despre mine</a>
    <a href="#">Proiecte</a>
    <a href="#">Contact</a>
  </nav>

  <div class="hero">

    <img class="profile" src="https://imgur.com/a/xv0RLqk"/>

    <h1>RAV</h1>
    <p>Portofoliu minimalist · aesthetic dark design</p>

  </div>

</body>
</html>
